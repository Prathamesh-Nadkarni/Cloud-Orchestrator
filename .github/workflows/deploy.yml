name: Deploy SvelteKit to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Unit Tests
        run: npm run test
        env:
          DATABASE_URL: "postgresql://user:password@localhost:5432/test_db"

      - name: Build
        run: npm run build
        env:
          # Use a mock or temporary DB URL for build-time static generation if needed,
          # though adapter-static usually doesn't need it if routes are prerendered.
          DATABASE_URL: "file:./dev.db"

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          # SvelteKit with adapter-static outputs to the 'build' folder
          path: 'build/'

  deploy:
    needs: build_site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4